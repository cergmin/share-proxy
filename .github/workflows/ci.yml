name: CI

on:
  workflow_dispatch:
  merge_group:
    types:
      - checks_requested
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
    paths-ignore:
      - '**/*.md'
      - 'memory-bank/**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths-ignore:
      - '**/*.md'
      - 'memory-bank/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: ${{ matrix.check }}
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    strategy:
      fail-fast: false
      matrix:
        check:
          - lint
          - test:ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ${{ matrix.check }}
        run: pnpm ${{ matrix.check }}

  publish-proxy-image:
    name: Publish proxy image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: image-vars
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          GHCR_IMAGE="ghcr.io/${OWNER_LC}/${REPO_NAME}-proxy"

          {
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "dockerhub_enabled=false"
            echo "dockerhub_image="
          } >> "${GITHUB_OUTPUT}"

          if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
            echo "dockerhub_enabled=true" >> "${GITHUB_OUTPUT}"
            echo "dockerhub_image=docker.io/${DOCKERHUB_USERNAME}/${REPO_NAME}-proxy" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.image-vars.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate GHCR tags
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-vars.outputs.ghcr_image }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - name: Generate Docker Hub tags
        id: meta-dockerhub
        if: steps.image-vars.outputs.dockerhub_enabled == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image-vars.outputs.dockerhub_image }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - name: Build and push proxy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/proxy/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.meta-ghcr.outputs.tags }}
            ${{ steps.meta-dockerhub.outputs.tags }}
          labels: |
            ${{ steps.meta-ghcr.outputs.labels }}
            ${{ steps.meta-dockerhub.outputs.labels }}
